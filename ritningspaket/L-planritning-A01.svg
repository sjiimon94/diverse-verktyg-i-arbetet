<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" width="1600" height="1100">
  <title>A-01 Planritning – Tillbyggnad träregelstomme</title>
  <desc>Planritning A-01 anpassad efter referensexempel för bygglovsritningar i skala 1:100.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#222"/>
