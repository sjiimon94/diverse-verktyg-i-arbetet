    .intwall { fill:none; stroke:#444; stroke-width:2.2; }
    .opening { fill:#fff; stroke:#111; stroke-width:1.5; }
    .window-line { stroke:#777; stroke-width:1.2; }
    .door { fill:none; stroke:#111; stroke-width:1.4; }
    .dim { fill:none; stroke:#666; stroke-width:1.1; }
    .guide { fill:none; stroke:#999; stroke-width:1; stroke-dasharray:6 5; }
