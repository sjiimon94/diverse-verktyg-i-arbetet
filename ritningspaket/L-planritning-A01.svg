<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-50 -50 1600 1100" width="1600" height="1100">
  <title>Planritning A-01 – Tillbyggnad träregelstomme (förenklad)</title>
  <desc>Preliminär planritning. Skala: ej skalenlig i SVG. Alla mått i mm (skalfaktor 0.1 i SVG-koordinater).</desc>
  
  <!-- Skalfaktor: 1 mm = 0.1 SVG-enheter, dvs alla koordinater / 10 -->
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="arrowhead-rev" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#333"/>
    </marker>
  </defs>
  
  <style>
    .wall-ext { fill: none; stroke: #000; stroke-width: 3; }
    .wall-int { fill: none; stroke: #666; stroke-width: 1.5; }
    .wall-ansl { fill: #FFD700; stroke: #B8860B; stroke-width: 2; opacity: 0.7; }
    .opening { fill: #FFF; stroke: #CC0000; stroke-width: 2; stroke-dasharray: 4,2; }
    .door { fill: none; stroke: #008000; stroke-width: 1.5; }
    .window { fill: #ADD8E6; stroke: #0000FF; stroke-width: 1.5; }
    .dim-line { fill: none; stroke: #999; stroke-width: 0.5; }
    .dim-text { font-family: Arial, sans-serif; font-size: 8px; fill: #333; text-anchor: middle; }
    .label { font-family: Arial, sans-serif; font-size: 10px; fill: #000; text-anchor: middle; }
    .label-small { font-family: Arial, sans-serif; font-size: 7px; fill: #666; text-anchor: start; }
    .title-text { font-family: Arial, sans-serif; font-size: 14px; fill: #000; font-weight: bold; }
    .section-line { fill: none; stroke: #FF00FF; stroke-width: 1; stroke-dasharray: 10,3,2,3; }
    .level-text { font-family: Arial, sans-serif; font-size: 8px; fill: #008000; }
    .warning-text { font-family: Arial, sans-serif; font-size: 7px; fill: #CC0000; }
    .wall-fill { fill: #D3D3D3; stroke: #000; stroke-width: 1; }
  </style>
  
  <!-- Bakgrund -->
  <rect x="-50" y="-50" width="1600" height="1100" fill="#FFFFFF"/>
  
  <!-- Titel -->
  <text x="50" y="-20" class="title-text">A-01 PLANRITNING – Tillbyggnad träregelstomme (PRELIMINÄR)</text>
  
  <!-- ================================================ -->
  <!-- YTTERVÄGGAR (polygon med väggtjocklek ~31 SVG-enheter = 310 mm) -->
  <!-- Yttre kontur -->
  <!-- ================================================ -->
  
  <!-- Yttervägg yttre kontur (utsida beklädnad, offset ~16 enheter utåt) -->
  <polygon class="wall-ext" points="
    -16,-16
    1066,-16
    1066,308
    1440,308
    1440,988
    732,988
    732,466
    -16,466
  "/>
  
  <!-- Yttervägg inre kontur (insida gips) -->
  <polygon class="wall-ext" points="
    15,15
    1035,15
    1035,340
    1409,340
    1409,957
    763,957
    763,435
    15,435
  "/>
  
  <!-- V7 anslutning 45 mm (gul) -->
  <rect x="15" y="435" width="733" height="5" class="wall-ansl"/>
  <text x="380" y="430" class="label-small" text-anchor="middle" fill="#B8860B">ANSL-1: 45 mm anslutningsregel mot bef. hus</text>
  
  <!-- Befintlig husvägg (streckad) -->
  <line x1="-30" y1="445" x2="780" y2="445" stroke="#999" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="400" y="460" class="label-small" text-anchor="middle" fill="#999">BEFINTLIG HUSVÄGG (lecasten)</text>
  
  <!-- ================================================ -->
  <!-- ÖPPNINGAR -->
  <!-- ================================================ -->
  
  <!-- D1 Ytterdörr i V1 (position 2000, bredd 1000) -->
  <rect x="200" y="-16" width="100" height="31" fill="#FFF" stroke="none"/>
  <line x1="200" y1="15" x2="200" y2="-16" class="door"/>
  <!-- Dörrblad (slagning) -->
  <path d="M 200,15 A 100,100 0 0,1 300,15" class="door"/>
  <text x="250" y="35" class="label">D1</text>
  
  <!-- F1 Fönster i V1 (position 5500, bredd 1200) -->
  <rect x="550" y="-16" width="120" height="31" fill="#ADD8E6" stroke="#0000FF" stroke-width="1"/>
  <line x1="560" y1="-6" x2="660" y2="-6" stroke="#0000FF" stroke-width="0.5"/>
  <line x1="560" y1="5" x2="660" y2="5" stroke="#0000FF" stroke-width="0.5"/>
  <text x="610" y="35" class="label">F1</text>
  
  <!-- F2 Fönster i V8 (position 1500, bredd 1000) -->
  <rect x="-16" y="285" width="31" height="100" fill="#ADD8E6" stroke="#0000FF" stroke-width="1"/>
  <text x="30" y="340" class="label">F2</text>
  
  <!-- F3 Fönster i V4 (position 2000 fr. P4, bredd 1200) -->
  <rect x="1409" y="540" width="31" height="120" fill="#ADD8E6" stroke="#0000FF" stroke-width="1"/>
  <text x="1395" y="605" class="label">F3</text>
  
  <!-- Ö1 Förstorad öppning i V5 -->
  <rect x="900" y="957" width="320" height="31" class="opening"/>
  <text x="1060" y="950" class="warning-text">Ö1: 3200×2100 PRELIMINÄRT</text>
  <text x="1060" y="1000" class="label" fill="#CC0000">Ö1</text>
  
  <!-- ================================================ -->
  <!-- INNERVÄGGAR -->
  <!-- ================================================ -->
  
  <!-- IW1 -->
  <line x1="391" y1="15" x2="391" y2="435" class="wall-int"/>
  <line x1="401" y1="15" x2="401" y2="435" class="wall-int"/>
  <text x="396" y="225" class="label-small" text-anchor="middle" transform="rotate(-90, 396, 225)">IW1</text>
  
  <!-- IW2 -->
  <line x1="391" y1="235" x2="748" y2="235" class="wall-int"/>
  <line x1="391" y1="245" x2="748" y2="245" class="wall-int"/>
  <text x="570" y="230" class="label-small" text-anchor="middle">IW2</text>
  
  <!-- ================================================ -->
  <!-- RUMSNAMN -->
  <!-- ================================================ -->
  
  <text x="200" y="225" class="label">Rum 1</text>
  <text x="200" y="240" class="label-small" text-anchor="middle">Allrum</text>
  
  <text x="570" y="140" class="label">Rum 2</text>
  <text x="570" y="155" class="label-small" text-anchor="middle">Sovrum/Kök</text>
  
  <text x="570" y="350" class="label">Rum 3</text>
  <text x="570" y="365" class="label-small" text-anchor="middle">Passage</text>
  
  <text x="1100" y="660" class="label">Rum 4</text>
  <text x="1100" y="675" class="label-small" text-anchor="middle">Arbetsrum</text>
  
  <!-- ================================================ -->
  <!-- NIVÅANGIVELSE -->
  <!-- ================================================ -->
  
  <text x="250" y="200" class="level-text">FG +68.12</text>
  
  <!-- ================================================ -->
  <!-- SEKTIONSLINJE A-A -->
  <!-- ================================================ -->
  
  <line x1="250" y1="-40" x2="250" y2="470" class="section-line"/>
  <circle cx="250" cy="-40" r="10" fill="none" stroke="#FF00FF" stroke-width="1.5"/>
  <text x="250" y="-37" class="label" fill="#FF00FF" font-size="8">A</text>
  <circle cx="250" cy="470" r="10" fill="none" stroke="#FF00FF" stroke-width="1.5"/>
  <text x="250" y="473" class="label" fill="#FF00FF" font-size="8">A</text>
  
  <!-- ================================================ -->
  <!-- MÅTTKEDJOR (förenklade) -->
  <!-- ================================================ -->
  
  <!-- Totalmått V1 -->
  <line x1="-16" y1="-35" x2="1066" y2="-35" class="dim-line"/>
  <text x="525" y="-38" class="dim-text">10 500</text>
  
  <!-- Totalmått V8 -->
  <line x1="-35" y1="-16" x2="-35" y2="466" class="dim-line"/>
  <text x="-40" y="225" class="dim-text" transform="rotate(-90, -40, 225)">4 500</text>
  
  <!-- Mått utskjutande del horisontellt -->
  <line x1="1066" y1="295" x2="1440" y2="295" class="dim-line"/>
  <text x="1253" y="290" class="dim-text">3 740</text>
  
  <!-- Mått utskjutande del vertikalt -->
  <line x1="1455" y1="308" x2="1455" y2="988" class="dim-line"/>
  <text x="1470" y="648" class="dim-text" transform="rotate(-90, 1470, 648)">6 480</text>
  
  <!-- Mått V2 -->
  <line x1="1080" y1="-16" x2="1080" y2="308" class="dim-line"/>
  <text x="1095" y="146" class="dim-text" transform="rotate(-90, 1095, 146)">3 240</text>
  
  <!-- Mått V5/övre horisontell -->
  <line x1="732" y1="1005" x2="1440" y2="1005" class="dim-line"/>
  <text x="1086" y="1020" class="dim-text">6 760</text>
  
  <!-- ================================================ -->
  <!-- NORRPIL -->
  <!-- ================================================ -->
  
  <g transform="translate(1350, -20)">
    <line x1="0" y1="30" x2="0" y2="0" stroke="#000" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="0" y="45" class="label" font-size="10">N</text>
    <text x="0" y="55" class="warning-text" text-anchor="middle">ANTAGEN</text>
  </g>
  
  <!-- ================================================ -->
  <!-- VÄGGBETECKNINGAR -->
  <!-- ================================================ -->
  
  <text x="525" y="-5" class="label-small" text-anchor="middle" fill="#000">V1</text>
  <text x="1050" y="160" class="label-small" fill="#000">V2</text>
  <text x="1250" y="325" class="label-small" text-anchor="middle" fill="#000">V3</text>
  <text x="1425" y="650" class="label-small" fill="#000">V4</text>
  <text x="1086" y="975" class="label-small" text-anchor="middle" fill="#000">V5</text>
  <text x="745" y="710" class="label-small" fill="#000">V6</text>
  <text x="380" y="450" class="label-small" text-anchor="middle" fill="#B8860B">V7 (45mm)</text>
  <text x="-5" y="225" class="label-small" fill="#000">V8</text>
  
  <!-- ================================================ -->
  <!-- RITNINGSHUVUD (förenklat) -->
  <!-- ================================================ -->
  
  <g transform="translate(1050, 1030)">
    <rect x="0" y="0" width="450" height="60" fill="#FFF" stroke="#000" stroke-width="1"/>
    <line x1="150" y1="0" x2="150" y2="60" stroke="#000" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="60" stroke="#000" stroke-width="0.5"/>
    <line x1="0" y1="20" x2="450" y2="20" stroke="#000" stroke-width="0.5"/>
    <line x1="0" y1="40" x2="450" y2="40" stroke="#000" stroke-width="0.5"/>
    <text x="75" y="15" class="dim-text" font-weight="bold">Projekt</text>
    <text x="225" y="15" class="dim-text">Tillbyggnad pulpettak</text>
    <text x="375" y="15" class="dim-text">A-01</text>
    <text x="75" y="35" class="dim-text">Planritning</text>
    <text x="225" y="35" class="dim-text">Skala: 1:50</text>
    <text x="375" y="35" class="dim-text">PRELIMINÄR</text>
    <text x="75" y="55" class="dim-text">2026-07-04</text>
    <text x="225" y="55" class="dim-text">Rev: –</text>
    <text x="375" y="55" class="dim-text">Sida 1</text>
  </g>
  
</svg>
