<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1150" width="1600" height="1150">
  <title>A-02 Fasadritningar – Tillbyggnad träregelstomme</title>
  <desc>Preliminär SVG-export av fasadritningar A-02. Mått i mm enligt ritningspaket. Ej produktionshandling.</desc>
  <style>
    .sheet { fill:#fff; stroke:#000; stroke-width:2; }
    .frame { fill:none; stroke:#000; stroke-width:1.5; }
    .wall { fill:none; stroke:#111; stroke-width:3; }
    .roof { fill:none; stroke:#111; stroke-width:4; }
    .opening { fill:#dbeeff; stroke:#003b8e; stroke-width:2; }
    .ground { fill:none; stroke:#666; stroke-width:2; stroke-dasharray:8 4; }
    .dim { fill:none; stroke:#c40000; stroke-width:1.5; }
    .dim-text { font: 18px Arial, sans-serif; fill:#c40000; }
    .text { font: 20px Arial, sans-serif; fill:#000; }
    .small { font: 15px Arial, sans-serif; fill:#333; }
    .title { font: 28px Arial, sans-serif; fill:#000; }
    .warn { font: 15px Arial, sans-serif; fill:#b10000; }
  </style>
  <rect x="20" y="20" width="1560" height="1110" class="sheet"/>
  <text x="60" y="70" class="title">A-02 FASADRITNINGAR – Tillbyggnad träregelstomme (PRELIMINÄR)</text>

