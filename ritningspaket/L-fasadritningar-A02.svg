<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1200" width="1800" height="1200">
  <title>A-02 Fasadritningar</title>
  <desc>Omritade fasader i sammanhållen bygglovsstil anpassade för PDF-export.</desc>
  <defs>
    <style>
