<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1180" width="1600" height="1180">
  <title>A-02 Fasadritningar – Tillbyggnad träregelstomme</title>
  <desc>Fasadritningar A-02 anpassade efter referensexempel för bygglovsritningar i skala 1:100.</desc>
  <style>
