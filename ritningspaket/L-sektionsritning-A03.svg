<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" width="1600" height="1100">
  <title>A-03 Sektionsritning – Tillbyggnad träregelstomme</title>
  <desc>Sektionsritning A-03 anpassad efter referensexempel för bygglovsritningar i skala 1:100.</desc>
  <style>
    .sheet { fill:#fff; stroke:#000; stroke-width:2; }
    .frame { fill:none; stroke:#000; stroke-width:1.2; }
    .wall { fill:none; stroke:#111; stroke-width:3.2; }
    .roof { fill:none; stroke:#111; stroke-width:3; stroke-linecap:round; }
    .base { fill:none; stroke:#111; stroke-width:2.2; }
    .mark-existing { fill:none; stroke:#999; stroke-width:1.5; stroke-dasharray:7 5; }
    .mark-finished { fill:none; stroke:#444; stroke-width:1.6; }
    .dim { fill:none; stroke:#666; stroke-width:1.1; }
    .title { font: 40px Georgia, 'Times New Roman', serif; fill:#2d3548; font-weight:700; }
    .text { font: 18px 'Arial', sans-serif; fill:#111; }
    .small { font: 15px 'Arial', sans-serif; fill:#333; }
    .tiny { font: 13px 'Arial', sans-serif; fill:#444; }
    .dimtext { font: 16px 'Arial', sans-serif; fill:#444; }
  </style>

  <rect x="20" y="20" width="1560" height="1060" class="sheet"/>
  <text x="70" y="80" class="title">Sektionsritning, skala 1:100</text>
  <text x="70" y="115" class="small">A-03 Sektion A–A med befintlig/blivande mark, nivåer och huvudmått</text>

  <rect x="60" y="145" width="1180" height="800" class="frame"/>

  <g transform="translate(135,215)">
    <line x1="0" y1="520" x2="960" y2="520" class="mark-existing"/>
    <path d="M0 540 L150 536 L280 532 L420 530 L590 528 L760 529 L960 531" class="mark-finished"/>

    <rect x="115" y="495" width="450" height="30" class="base"/>
    <line x1="115" y1="360" x2="115" y2="495" class="wall"/>
    <line x1="145" y1="360" x2="145" y2="495" class="wall"/>
    <line x1="565" y1="135" x2="565" y2="495" class="wall"/>
    <line x1="600" y1="135" x2="600" y2="495" class="wall"/>

    <line x1="115" y1="360" x2="600" y2="260" class="roof"/>
    <line x1="115" y1="372" x2="600" y2="272" class="roof"/>

    <line x1="600" y1="80" x2="600" y2="495" class="guide" style="stroke:#777; stroke-width:2; stroke-dasharray:6 5;"/>
    <text x="625" y="105" class="small">Befintligt hus</text>

    <text x="180" y="345" class="small">Väggreglar 45×145, c/c 450</text>
    <text x="285" y="240" class="small">Takstol 45×195 + 45×45, c/c 450</text>
    <text x="275" y="470" class="small">FG +68.12</text>
    <text x="617" y="470" class="small">FG +68.12</text>
    <text x="390" y="300" class="small">14°</text>

    <line x1="80" y1="360" x2="80" y2="495" class="dim"/>
    <line x1="80" y1="360" x2="115" y2="360" class="dim"/>
    <line x1="80" y1="495" x2="115" y2="495" class="dim"/>
    <text x="66" y="430" class="dimtext" transform="rotate(-90 66 430)">2 330</text>

    <line x1="46" y1="260" x2="46" y2="495" class="dim"/>
    <line x1="46" y1="260" x2="115" y2="260" class="dim"/>
    <line x1="46" y1="495" x2="115" y2="495" class="dim"/>
    <text x="32" y="382" class="dimtext" transform="rotate(-90 32 382)">3 400</text>

    <line x1="115" y1="575" x2="565" y2="575" class="dim"/>
    <line x1="115" y1="495" x2="115" y2="588" class="dim"/>
    <line x1="565" y1="495" x2="565" y2="588" class="dim"/>
    <text x="340" y="603" class="dimtext" text-anchor="middle">4 500</text>
  </g>

  <g transform="translate(1265,835)">
    <rect x="0" y="0" width="260" height="130" class="frame"/>
    <line x1="0" y1="36" x2="260" y2="36" class="frame"/>
    <line x1="0" y1="72" x2="260" y2="72" class="frame"/>
    <line x1="0" y1="108" x2="260" y2="108" class="frame"/>
    <line x1="88" y1="0" x2="88" y2="130" class="frame"/>
    <text x="12" y="24" class="tiny">Ritning</text>
    <text x="100" y="24" class="tiny">Sektion A–A</text>
    <text x="12" y="60" class="tiny">Ritn.nr</text>
    <text x="100" y="60" class="tiny">A-03</text>
    <text x="12" y="96" class="tiny">Skala</text>
    <text x="100" y="96" class="tiny">1:100</text>
    <text x="12" y="124" class="tiny">Datum</text>
    <text x="100" y="124" class="tiny">2026-07-05</text>
  </g>
</svg>
